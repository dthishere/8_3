<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff9acb,#ffc3d9);
font-family:'Dancing Script',cursive;
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:55px;
opacity:0;
transition:2s;
}

h2{
font-size:35px;
opacity:0;
transition:2s;
}

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:bay 5s linear infinite;
}

@keyframes bay{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

</style>
</head>

<body>

<h1 id="love">Híu yêu Na rất nhiều 💖</h1>

<h2 id="thanks">Cảm ơn Na đã ở đây</h2>

<script>

/* tim bay */

function taoTim(){

let tim=document.createElement("div")

tim.className="heart"

tim.innerHTML="💗"

tim.style.left=Math.random()*100+"vw"

document.body.appendChild(tim)

setTimeout(()=>{
tim.remove()
},5000)

}

setInterval(taoTim,300)



/* hiện chữ */

setTimeout(()=>{
document.getElementById("love").style.opacity=1
},1000)

setTimeout(()=>{
document.getElementById("thanks").style.opacity=1
},6000)

</script>

</body>
</html>
