<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff9acb,#ffb6d9);
overflow:hidden;
text-align:center;
}

/* chữ */

#love{
font-family:'Dancing Script',cursive;
font-size:55px;
color:white;
opacity:0;
transition:2s;
}

#thanks{
font-family:'Poppins',sans-serif;
font-size:28px;
color:white;
opacity:0;
margin-top:20px;
transition:2s;
}

/* tim bay */

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:bay 5s linear infinite;
}

@keyframes bay{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* hoa rơi */

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

/* pháo hoa */

.firework{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
animation:boom 1s forwards;
}

@keyframes boom{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(8);opacity:0;}
}

</style>
</head>

<body>

<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<h1 id="love">Híu yêu Na rất nhiều 💖</h1>
<h2 id="thanks">Cảm ơn Na đã ở đây</h2>

<script>

/* tiếp tục nhạc */

let music=document.getElementById("music")

if(localStorage.getItem("musicPlaying")){
music.play()
}



/* tim bay */

function heart(){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"

document.body.appendChild(h)

setTimeout(()=>{
h.remove()
},5000)

}

setInterval(heart,300)



/* hoa rơi */

function flower(){

let f=document.createElement("div")

f.className="flower"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

document.body.appendChild(f)

setTimeout(()=>{
f.remove()
},6000)

}

setInterval(flower,400)



/* pháo hoa */

for(let i=0;i<30;i++){

setTimeout(()=>{

let p=document.createElement("div")

p.className="firework"

p.style.left=Math.random()*100+"vw"
p.style.top=Math.random()*100+"vh"

p.style.background=`hsl(${Math.random()*360},100%,60%)`

document.body.appendChild(p)

setTimeout(()=>{
p.remove()
},1000)

},i*150)

}



/* hiện chữ */

setTimeout(()=>{
document.getElementById("love").style.opacity=1
},1000)

setTimeout(()=>{
document.getElementById("thanks").style.opacity=1
},6000)

</script>

</body>
</html>
