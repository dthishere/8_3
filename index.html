<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Na 8/3</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow-x:hidden;
}

/* sao */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:35px 35px;
opacity:0.25;
z-index:-1;
}

/* tiêu đề */

.title{
margin-top:40px;
font-size:36px;
color:#ff7eb9;
text-shadow:0 0 20px #ff2f92;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff2f92;}
to{ text-shadow:0 0 30px #ff2f92;}
}

.subtitle{
margin-top:10px;
color:#ffc9e3;
}

/* ảnh */

.photo{
margin-top:30px;
}

.photo img{
width:200px;
height:260px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,120,0.7);
}

/* tim */

.heart{
font-size:55px;
margin:20px;
cursor:pointer;
animation:beat 1.2s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* card */

.card{
width:90%;
max-width:500px;
margin:20px auto;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(8px);
box-shadow:0 0 25px rgba(255,0,130,0.4);
}

/* text */

.text{
font-size:18px;
line-height:1.8;
margin-top:10px;
word-wrap:break-word;
}

/* tim bay */

.fly{
position:fixed;
bottom:-20px;
font-size:20px;
color:#ff6fa5;
animation:fly 6s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-100vh) scale(2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="title">💗 Chúc mừng 8/3 💗</div>
<div class="subtitle">Một điều nhỏ dành riêng cho Na ✨</div>

<div class="photo">
<img src="na.jpg">
</div>

<div class="heart" onclick="love()">❤️</div>

<div class="card">
<div id="text" class="text"></div>
</div>

<script>

/* lời chúc */

const message = `💞 Na là điều rất đặc biệt với Hiếu 💞

Chúc Na luôn xinh đẹp, vui vẻ và hạnh phúc mỗi ngày 🌸

Cảm ơn vì đã xuất hiện trong cuộc sống của Hiếu.

Hy vọng mỗi ngày của Na đều tràn ngập niềm vui,
nụ cười và những điều ngọt ngào nhất.

Chúc Na có một ngày 8/3 thật đặc biệt
và thật nhiều yêu thương 💛

Happy Women's Day Na ❤️`;


/* chữ hiện dần */

let i=0

function typing(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i)

i++

setTimeout(typing,40)

}

}

typing()


/* tim bay */

function createHeart(){

const heart=document.createElement("div")

heart.classList.add("fly")

heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(15+Math.random()*25)+"px"

heart.style.animationDuration=(4+Math.random()*3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},6000)

}

setInterval(createHeart,400)


/* bấm tim */

function love(){

if(navigator.vibrate){

navigator.vibrate([200,100,200])

}

for(let i=0;i<10;i++){

createHeart()

}

}

</script>

</body>
</html>
