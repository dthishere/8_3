<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy 8/3 💖</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
text-align:center;
color:white;
}

/* ảnh Na */

#na{
width:220px;
border-radius:20px;
margin-top:20px;
opacity:0;
transition:3s;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* chữ */

#text{
font-size:24px;
width:70%;
min-height:60px;
}

/* tim bay */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:bay 5s linear infinite;
}

@keyframes bay{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* pháo hoa */

.firework{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
animation:no 1s forwards;
}

@keyframes no{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(8);opacity:0;}
}

/* bất ngờ */

#surprise{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
opacity:0;
transition:1s;
}

</style>

</head>

<body>

<h1>💐 Happy 8/3 Na 💐</h1>

<p id="text"></p>

<img id="na" src="na.jpg">

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="surprise">
💖 Cảm ơn Na vì đã ở đây 💖
</div>

<script>

/* nhạc */

let music=document.getElementById("music")

document.addEventListener("click",()=>{
music.play()
},{once:true})



/* chữ hiện từng chữ */

let message="Chúc Na luôn xinh đẹp, vui vẻ và hạnh phúc. Cảm ơn vì đã xuất hiện và làm thế giới này dễ thương hơn 💖"

let i=0

function typeText(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i)

i++

setTimeout(typeText,60)

}

}

typeText()



/* ảnh hiện từ từ */

setTimeout(()=>{
document.getElementById("na").style.opacity=1
},2000)



/* tim bay */

function taoTim(){

let tim=document.createElement("div")

tim.className="heart"

tim.innerHTML="💖"

tim.style.left=Math.random()*100+"vw"

tim.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(tim)

setTimeout(()=>{
tim.remove()
},5000)

}

setInterval(taoTim,300)



/* pháo hoa 40s */

setTimeout(()=>{

for(let i=0;i<40;i++){

let p=document.createElement("div")

p.className="firework"

p.style.left=Math.random()*100+"vw"

p.style.top=Math.random()*100+"vh"

p.style.background=`hsl(${Math.random()*360},100%,60%)`

document.body.appendChild(p)

setTimeout(()=>{
p.remove()
},1000)

}

},40000)



/* bất ngờ 50s */

setTimeout(()=>{

document.getElementById("surprise").style.opacity=1

},50000)

</script>

</body>
</html>
