<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Na 💖</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
background:radial-gradient(circle,#0f2027,#203a43,#2c5364);
}

/* sao */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:0.3;
z-index:-1;
pointer-events:none;
}

h1{
margin-top:50px;
color:#ff7eb9;
}

#text{
font-size:20px;
max-width:90%;
margin:auto;
line-height:1.6;
min-height:120px;
color:#ff7eb9;
}

/* nút */

button{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
background:#ff7eb9;
color:white;
margin-top:20px;
}

/* tim */

.heart{
position:absolute;
font-size:20px;
animation:fly 2s linear forwards;
}

@keyframes fly{
0%{transform:scale(1);opacity:1}
100%{transform:translateY(-200px) scale(2);opacity:0}
}

/* ảnh */

#photo{
display:none;
margin-top:20px;
}

#photo img{
width:220px;
border-radius:20px;
box-shadow:0 0 30px pink;
}

/* bất ngờ */

#surprise{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
opacity:0;
transition:2s;
color:#ff7eb9;
}

</style>
</head>

<body>

<h1>💖 Gửi Na 💖</h1>

<div id="text"></div>

<button onclick="start()">Bấm vào đây nha Na 💌</button>

<div id="photo">
<img src="na.jpg">
</div>

<div id="surprise">
Anh thích Na rất nhiều 💗
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f0e8a6e17.mp3">
</audio>

<script>

const messages = [
"Chúc Na một ngày 8/3 thật nhiều niềm vui 🌸",
"Luôn luôn xinh đẹp và hạnh phúc",
"Cảm ơn Na vì đã xuất hiện",
"Làm cho thế giới của anh trở nên đặc biệt hơn",
"Và thật ra...",
"Anh có điều muốn nói..."
];

let i = 0;

function start() {

    const btn = document.querySelector("button");
    btn.style.display = "none";

    const music = document.getElementById("music");
    music.muted = false;

    music.play().catch(() => {
        console.log("Trình duyệt chặn autoplay audio");
    });

    showText();
}

function showText() {

    const text = document.getElementById("text");

    if (i < messages.length) {

        text.innerHTML = messages[i];
        i++;

        setTimeout(showText, 2000);

    } else {

        document.getElementById("photo").style.display = "block";

        fireworks();

        setTimeout(() => {
            document.getElementById("surprise").style.opacity = 1;
        }, 4000);
    }
}

document.addEventListener("click", function(e){

    let heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 2000);

});

function fireworks(){

    for(let i = 0; i < 30; i++){

        setTimeout(() => {

            let heart = document.createElement("div");

            heart.className = "heart";
            heart.innerHTML = "💗";

            heart.style.left = Math.random()*window.innerWidth + "px";
            heart.style.top = Math.random()*window.innerHeight + "px";

            document.body.appendChild(heart);

            setTimeout(()=>{
                heart.remove();
            },2000);

        }, i * 100);
    }
}

</script>

</body>
</html>
