<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Na 💖</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;

background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

h1{
font-size:28px;
margin:10px;
}

#text{
font-size:20px;
max-width:90%;
line-height:1.6;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
background:white;
color:#ff4b7d;
margin-top:20px;
cursor:pointer;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:fly 2s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-200px) scale(2);
opacity:0;
}
}

#surprise{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
opacity:0;
color:#ff4b7d;
transition:2s;
}

</style>
</head>

<body>

<h1>💖 Gửi Na 💖</h1>

<div id="text"></div>

<button onclick="start()">Bấm vào đây nha Na 💌</button>

<div id="surprise">Anh thích Na rất nhiều 💖</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f0e8a6e17.mp3" type="audio/mpeg">
</audio>

<script>

const messages=[
"Chúc Na một ngày 8/3 thật nhiều niềm vui 🌸",
"Luôn luôn xinh đẹp và hạnh phúc",
"Cảm ơn Na vì đã xuất hiện",
"Làm cho thế giới của anh trở nên đặc biệt hơn",
"Và thật ra...",
"Anh có điều này muốn nói..."
]

let i=0
let text=document.getElementById("text")

function start(){

document.querySelector("button").style.display="none"

document.getElementById("music").play()

showText()

}

function showText(){

if(i<messages.length){

let line=messages[i]
let j=0

let interval=setInterval(()=>{

text.innerHTML=line.substring(0,j)

j++

if(j>line.length){
clearInterval(interval)
i++
setTimeout(showText,1500)
}

},80)

}

else{

fireworks()

setTimeout(()=>{
document.getElementById("surprise").style.opacity=1
},3000)

}

}

document.addEventListener("click",(e)=>{

let heart=document.createElement("div")

heart.innerHTML="❤️"

heart.className="heart"

heart.style.left=e.clientX+"px"
heart.style.top=e.clientY+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

})

function fireworks(){

for(let i=0;i<30;i++){

setTimeout(()=>{

let heart=document.createElement("div")

heart.innerHTML="💖"

heart.className="heart"

heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

},i*150)

}

}

</script>

</body>
</html>
