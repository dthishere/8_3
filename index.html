<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gửi Na ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;

/* NỀN TRỜI ĐÊM */

background:linear-gradient(to bottom,#0f2027,#203a43,#2c5364);

color:white;

}

/* SAO */

.star{

position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;

}

@keyframes twinkle{

from{opacity:0.2}
to{opacity:1}

}

/* CONTAINER */

.container{

max-width:90%;
z-index:10;

}

/* TITLE */

.title{

font-family:'Pacifico';
font-size:42px;

background:linear-gradient(45deg,#ff4da6,#ff9ac4,#ffd700);
-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 15px rgba(255,100,200,0.9),
0 0 30px rgba(255,100,200,0.6);

}

/* SUB */

.subtitle{

margin-top:10px;
font-size:18px;
color:#ffc6e2;

}

/* HEART */

.heart{

font-size:70px;
margin-top:30px;
cursor:pointer;

animation:beat 1.3s infinite;

}

@keyframes beat{

0%{transform:scale(1)}
25%{transform:scale(1.2)}
50%{transform:scale(1)}
75%{transform:scale(1.25)}
100%{transform:scale(1)}

}

/* MESSAGE */

.message{

margin-top:30px;
font-size:18px;
line-height:1.8;
padding:0 10px;

background:linear-gradient(45deg,#ff6ec7,#ffd700);
-webkit-background-clip:text;
color:transparent;

min-height:160px;

}

/* CURSOR */

.cursor{

display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:5px;
animation:blink 1s infinite;

}

@keyframes blink{

0%{opacity:0}
50%{opacity:1}
100%{opacity:0}

}

/* HEART RAIN */

.fall{

position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;

}

@keyframes fall{

to{

transform:translateY(110vh);
opacity:0;

}

}

/* SURPRISE */

.surprise{

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%) scale(0);

font-size:22px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);

padding:30px;
border-radius:20px;

box-shadow:0 0 25px pink;

transition:0.6s;

}

.surprise.show{

transform:translate(-50%,-50%) scale(1);

}

</style>
</head>

<body>

<div class="container">

<div class="title">
💖 Chúc mừng 8/3 💖
</div>

<div class="subtitle">
Một điều nhỏ dành riêng cho Na ✨
</div>

<div class="heart" onclick="startLove()">
❤️
</div>

<div class="message">
<span id="text"></span><span class="cursor"></span>
</div>

</div>

<div class="surprise" id="surprise">
💗 Na là điều rất đặc biệt với Hiếu 💗  
<br><br>
Chúc Na luôn vui vẻ và hạnh phúc mỗi ngày 🌸
</div>

<script>

/* TẠO SAO */

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDuration=(1+Math.random()*2)+"s";

document.body.appendChild(star);

}

/* HEART RAIN */

setInterval(()=>{

let heart=document.createElement("div");

heart.innerHTML="💗";

heart.className="fall";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove()

},6000)

},350)

/* MESSAGE */

const message = `Chúc Na luôn xinh đẹp, vui vẻ và hạnh phúc mỗi ngày.

Cảm ơn vì đã xuất hiện trong cuộc sống của Hiếu.

Hy vọng mỗi ngày của Na đều tràn ngập niềm vui và nụ cười.

Chúc Na có một ngày 8/3 thật đặc biệt và thật nhiều yêu thương.

💗 Happy Women's Day Na 💗`;

let i=0;

function startLove(){

typeWriter();

}

function typeWriter(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,40);

}else{

setTimeout(()=>{

document.getElementById("surprise").classList.add("show");

},2000)

}

}

</script>

</body>
</html>
