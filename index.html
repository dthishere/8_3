<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy 8/3 💖</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
text-align:center;
}

h1{
color:white;
font-size:45px;
}

p{
color:white;
font-size:22px;
width:70%;
}

img{
width:220px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* tim bay */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:bay 5s linear infinite;
}

@keyframes bay{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* pháo hoa */

.firework{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
animation:no 1s forwards;
}

@keyframes no{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(8);opacity:0;}
}

/* bất ngờ */

#surprise{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
opacity:0;
transition:1s;
}

</style>

</head>

<body>

<h1>💐 Happy 8/3 Na 💐</h1>

<p>
Chúc Na luôn xinh đẹp, vui vẻ và hạnh phúc 💖  
Cảm ơn vì đã xuất hiện và làm thế giới này dễ thương hơn 🌸
</p>

<img src="na.jpg">

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="surprise">
💖 Cảm ơn Na vì đã ở đây 💖
</div>

<script>

let running=true

/* tim bay */

function taoTim(){

if(!running) return

let tim=document.createElement("div")
tim.className="heart"
tim.innerHTML="💖"
tim.style.left=Math.random()*100+"vw"
tim.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(tim)

setTimeout(()=>{
tim.remove()
},5000)

}

let heartInterval=setInterval(taoTim,300)



/* tim nổ khi chạm */

document.addEventListener("click",(e)=>{

if(!running) return

for(let i=0;i<8;i++){

let tim=document.createElement("div")

tim.innerHTML="💖"

tim.style.position="fixed"
tim.style.left=e.clientX+"px"
tim.style.top=e.clientY+"px"

tim.style.fontSize="25px"
tim.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`
tim.style.transition="1s"

document.body.appendChild(tim)

setTimeout(()=>{
tim.style.opacity=0
},10)

setTimeout(()=>{
tim.remove()
},1000)

}

})



/* pháo hoa sau 40s */

setTimeout(()=>{

for(let i=0;i<40;i++){

let p=document.createElement("div")

p.className="firework"

p.style.left=Math.random()*100+"vw"
p.style.top=Math.random()*100+"vh"

p.style.background=`hsl(${Math.random()*360},100%,60%)`

document.body.appendChild(p)

setTimeout(()=>{
p.remove()
},1000)

}

},40000)



/* kết thúc sau 50s */

setTimeout(()=>{

running=false
clearInterval(heartInterval)

document.getElementById("surprise").style.opacity=1

},50000)

</script>

</body>
</html>
