<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gửi Na 💖</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
background:radial-gradient(circle,#0f2027,#203a43,#2c5364);
}

/* nền sao */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:0.3;
z-index:-1;
pointer-events:none;
}

/* tiêu đề */

h1{
margin-top:50px;
color:#ff7eb9;
}

/* chữ */

#text{
font-size:22px;
max-width:90%;
margin:auto;
line-height:1.7;
min-height:120px;
color:#ff7eb9;
padding:20px;
}

/* ảnh */

#photo{
display:none;
margin-top:25px;
}

#photo img{
width:230px;
border-radius:20px;
box-shadow:0 0 40px pink;
}

/* tim */

.heart{
position:absolute;
font-size:22px;
animation:fly 2s linear forwards;
pointer-events:none;
}

@keyframes fly{
0%{
transform:scale(1);
opacity:1;
}
100%{
transform:translateY(-200px) scale(2);
opacity:0;
}
}

/* bất ngờ */

#surprise{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:#ff7eb9;
opacity:0;
transition:2s;
}

</style>
</head>

<body>

<h1>💖 Gửi Na 💖</h1>

<div id="text"></div>

<div id="photo">
<img src="na.jpg">
</div>

<div id="surprise">
Anh thích Na rất nhiều 💗
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* lời chúc */

const messages=[
"Chúc Na một ngày 8/3 thật nhiều niềm vui 🌸",
"Luôn luôn xinh đẹp và hạnh phúc",
"Cảm ơn Na vì đã xuất hiện trong cuộc sống của anh",
"Làm cho thế giới của anh trở nên đặc biệt hơn",
"Và thật ra...",
"Anh có một điều muốn nói..."
];

let i=0;

const text=document.getElementById("text");
const music=document.getElementById("music");

/* web tự chạy */

setTimeout(()=>{

music.play().catch(()=>{});

showText();

},1000);


/* hiệu ứng gõ chữ */

function typeWriter(message,callback){

let index=0;

text.innerHTML="";

let typing=setInterval(()=>{

text.innerHTML+=message[index];

index++;

if(index===message.length){

clearInterval(typing);

setTimeout(callback,1200);

}

},50);

}

/* hiện từng câu */

function showText(){

if(i<messages.length){

typeWriter(messages[i],()=>{

i++;

showText();

});

}

else{

document.getElementById("photo").style.display="block";

fireworks();

setTimeout(()=>{

document.getElementById("surprise").style.opacity=1;

},4000);

}

}

/* tim khi chạm */

document.addEventListener("click",function(e){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2000);

});

/* pháo hoa */

function fireworks(){

for(let i=0;i<40;i++){

setTimeout(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2000);

},i*120);

}

}

</script>

</body>
</html>
