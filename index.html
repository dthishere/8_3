<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 8/3 Na 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#ffb6c1;
font-family:'Poppins',sans-serif;
text-align:center;
color:#8b004f;
overflow:hidden;
}

h1{
font-family:'Dancing Script',cursive;
font-size:40px;
color:#b30059;
}

#text{
font-size:20px;
width:85%;
line-height:1.7;
min-height:100px;
}

#na{
width:220px;
border-radius:20px;
margin-top:20px;
opacity:0;
transition:3s;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:bay 5s linear infinite;
}

@keyframes bay{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

#gift{
position:fixed;
bottom:80px;
font-size:60px;
display:none;
cursor:pointer;
}

</style>
</head>

<body>

<h1>💐 Happy 8/3 Na 💐</h1>

<p id="text"></p>

<img id="na" src="na.jpg">

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="gift">🎁</div>

<script>

/* phát nhạc điện thoại */

let music=document.getElementById("music")

document.body.addEventListener("click",()=>{
music.play()
},{once:true})

document.body.addEventListener("touchstart",()=>{
music.play()
},{once:true})



/* lời chúc */

let message=
"Chúc Na một ngày 8/3 thật nhiều niềm vui. \
Chúc Na luôn xinh đẹp, luôn rạng rỡ và luôn mỉm cười thật tươi. \
Mong rằng mỗi ngày của Na đều tràn ngập hạnh phúc. \
Hy vọng rằng Na sẽ luôn được yêu thương, luôn được quan tâm và luôn thật hạnh phúc."

let i=0

function typeText(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i)

i++

setTimeout(typeText,90)

}

}

typeText()



/* ảnh xuất hiện */

setTimeout(()=>{
document.getElementById("na").style.opacity=1
},3000)



/* tim bay */

function taoTim(){

let tim=document.createElement("div")

tim.className="heart"

tim.innerHTML="💖"

tim.style.left=Math.random()*100+"vw"

document.body.appendChild(tim)

setTimeout(()=>{
tim.remove()
},5000)

}

setInterval(taoTim,400)



/* hiện quà */

setTimeout(()=>{
document.getElementById("gift").style.display="block"
},40000)



/* bấm quà */

document.getElementById("gift").onclick=function(){

window.location.href="gift.html"

}

</script>

</body>
</html>
